  }

  /* WhatsApp clickable overlay over the existing button in the design */
  .whatsapp-overlay {
    position: absolute;
    left: 2%;
    top: 80.6%;
    width: 83%;
    height: 11.8%;
    cursor: pointer;
    border-radius: 50px;
    animation: breathe 2.2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.035);
    }
  }

  .whatsapp-overlay:active {
    transform: scale(0.97);
  }

  /* Guardar Contacto button - added below, matching palette */
  .save-contact-wrap {
    width: 100%;
    background: linear-gradient(180deg, #1a0a2e 0%, #2d0f4a 100%);
    padding: 22px 24px 30px;
    text-align: center;
  }

  .save-contact-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 460px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #d6006e 0%, #7b1fa2 100%);
    border: 2px solid #ffd93d;
    border-radius: 50px;
    color: #ffffff;
    font-size: 18px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-decoration: none;
    box-shadow: 0 4px 18px rgba(214, 0, 110, 0.5), 0 0 0 rgba(255, 217, 61, 0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
  }

  .save-contact-btn:active {
    transform: scale(0.97);
  }

  .save-contact-btn svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .save-hint {
    color: #d9b8ff;
    font-size: 12px;
    margin-top: 10px;
    font-weight: 400;
    opacity: 0.85;
  }
</style>
</head>
